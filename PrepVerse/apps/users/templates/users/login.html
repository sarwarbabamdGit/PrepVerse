{% extends 'base.html' %}
{% load static %}

{% block title %}Login - PrepVerse{% endblock %}

{% block content %}
<div class="glass" style="max-width: 500px; margin: 4rem auto;">
    <h2 style="margin-bottom: 2rem; text-align: center;">Welcome Back</h2>
    <form method="POST">
        {% csrf_token %}
        
        {% if form.errors %}
            <div style="background: rgba(231, 76, 60, 0.1); color: #e74c3c; padding: 0.75rem; border-radius: 8px; margin-bottom: 1.5rem; border: 1px solid rgba(231, 76, 60, 0.3);">
                Your username and password didn't match. Please try again.
            </div>
        {% endif %}

        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Username</label>
            <input type="text" name="username" class="search-box" style="width: 100%; border: 1px solid rgba(0,0,0,0.1); margin: 0; box-shadow: none;" required>
        </div>
        <div style="margin-bottom: 2rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Password</label>
            <input type="password" name="password" class="search-box" style="width: 100%; border: 1px solid rgba(0,0,0,0.1); margin: 0; box-shadow: none;" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Login</button>
    </form>
    <p style="text-align: center; margin-top: 2rem; opacity: 0.7;">
        Don't have an account? <a href="{% url 'users:register' %}" style="color: var(--primary); font-weight: 600;">Register here</a>
    </p>
</div>
{% endblock %}
